<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>おはVメーカー for WONDer PO</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Kiwi+Maru:wght@500&family=Mochiy+Pop+One&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
font-family: 'Kiwi Maru', sans-serif;
background: linear-gradient(135deg, #ffeef8, #e6f9ff);
padding: 20px;
color: #4a4a4a;
}
.wrapper{max-width:1100px;margin:auto}

h1 {
text-align: center;
margin-bottom: 25px;
color: #ff6fb5;
font-family: 'Mochiy Pop One', sans-serif;
text-shadow: 2px 2px 0px #fff, 4px 4px 0px rgba(255, 111, 181, 0.2);
font-size: 2.2rem;
}

.panel{
background: rgba(255, 255, 255, 0.85);
padding: 30px;
border-radius: 24px;
box-shadow: 0 12px 28px rgba(255, 111, 181, 0.15);
backdrop-filter: blur(10px);
border: 2px solid #fff;
}
.layout{display:flex;gap:30px;flex-wrap:wrap;justify-content: center;}

/* プレビューエリア */
.preview-container {
display: flex;
flex-direction: column;
align-items: center;
gap: 15px;
}

.preview{
width:500px;height:500px;
position:relative;
overflow:hidden;
background:#fff;
border-radius:20px;
box-shadow: 0 8px 20px rgba(0,0,0,0.08);
border: 4px solid #fff;
/* スマホ等での不要な長押しメニューを防止 */
-webkit-touch-callout: none;
user-select: none;
}
.preview img{position:absolute;user-select:none;-webkit-user-drag: none;}
#bg{inset:0;width:100%;height:100%;object-fit:cover;z-index:1;pointer-events:none;}
#avatar{z-index:2;left:100px;top:100px;width:300px;cursor:move;transform-origin: center center;}
#frame{inset:0;width:100%;height:100%;object-fit:contain;z-index:3;pointer-events:none}

/* コントロールエリア */
.controls{flex:1;min-width:320px;max-width: 500px;}
.section{
background: rgba(255, 255, 255, 0.9);
padding: 18px;
border-radius: 16px;
margin-bottom: 20px;
border: 1px solid #ffe3f1;
}
.section h3{
margin-bottom: 12px;
color: #ff529c;
font-size: 1.1rem;
font-family: 'Mochiy Pop One', sans-serif;
display: flex;
align-items: center;
gap: 6px;
}
.section h3::before {
content: "🐾";
font-size: 0.9rem;
}
